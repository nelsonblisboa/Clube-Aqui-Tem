version: '3.3'

services:
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - SERVER_URL=${SERVER_URL}
      - AUTHENTICATION_API_KEY=${AUTHENTICATION_API_KEY}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true

      # Database
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@evolution_postgres:5432/${POSTGRES_DB}

      # Redis
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evolution_redis:6379/1

      # Webhook
      - WEBHOOK_GLOBAL_URL=${WEBHOOK_GLOBAL_URL}
      - WEBHOOK_GLOBAL_ENABLED=false

    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    networks:
      - evolution_net
    depends_on:
      - evolution_redis
      - evolution_postgres

  evolution_manager:
    image: evoapicloud/evolution-manager:latest
    container_name: evolution_manager
    restart: always
    ports:
      - "8081:80" # Mapping to 8081 to avoid conflict if any, or just 8081 for manager
    environment:
      - VITE_API_URL=${SERVER_URL} # Manager needs to know where the API is
    networks:
      - evolution_net
    depends_on:
      - evolution-api

  evolution_postgres:
    image: postgres:15
    container_name: evolution_postgres
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    networks:
      - evolution_net
    command:
      - "postgres"
      - "-c"
      - "max_connections=1000"

  evolution_redis:
    image: redis:alpine
    container_name: evolution_redis
    command: redis-server --appendonly yes
    restart: always
    volumes:
      - evolution_redis_data:/data
    networks:
      - evolution_net

volumes:
  evolution_instances:
  evolution_store:
  evolution_redis_data:
  evolution_postgres_data:


networks:
  evolution_net:
    driver: bridge
