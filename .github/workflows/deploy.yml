name: Deploy to Umbler via FTP

# Executa o deploy automaticamente quando há push na branch main
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Fazer checkout do código
      - name: Checkout código
        uses: actions/checkout@v3
      
      # 2. Configurar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      # 3. Instalar dependências
      - name: Instalar dependências
        run: npm ci
      
      # 4. Fazer build de produção
      - name: Build de produção
        run: npm run build
      
      # 5. Deploy via FTP
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: geonosis01.umbler.host
          username: clubeaquitem-com-br
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/src/**
            **/.vscode/**
            **/.idea/**
            **/DEPLOY_*.md
            **/REFACTORING_*.md
            **/GITHUB_*.md
            **/QUICK_*.md
            **/*.md
            .gitignore
            .env.example
            eslint.config.js
            postcss.config.js
            tailwind.config.ts
            tsconfig.*.json
            vite.config.ts
            components.json
          dangerous-clean-slate: false
      
      # 6. Notificação de sucesso
      - name: Deploy concluído
        run: echo "✅ Deploy realizado com sucesso!"
